on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kies weerfeitje
        id: fact
        run: |
          FACT=$(shuf -n 1 facts.txt)
          echo "FACT=$FACT" >> "$GITHUB_OUTPUT"

      - name: Haal weer op
        id: weather
        run: |
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&current=temperature_2m,apparent_temperature,wind_speed_10m&daily=precipitation_probability_max&timezone=Europe%2FAmsterdam")
          echo "TEMP=$(echo "$DATA" | jq -r '.current.temperature_2m')" >> "$GITHUB_OUTPUT"
          echo "FEEL=$(echo "$DATA" | jq -r '.current.apparent_temperature')" >> "$GITHUB_OUTPUT"
          echo "WIND=$(echo "$DATA" | jq -r '.current.wind_speed_10m')" >> "$GITHUB_OUTPUT"
          echo "RAIN=$(echo "$DATA" | '.daily.precipitation_probability_max[0]')" >> "$GITHUB_OUTPUT"

      - name: Verstuur naar Discord
        env:
          FACT: ${{ steps.fact.outputs.FACT }}
          TEMP: ${{ steps.weather.outputs.TEMP }}
          FEEL: ${{ steps.weather.outputs.FEEL }}
          WIND: ${{ steps.weather.outputs.WIND }}
          RAIN: ${{ steps.weather.outputs.RAIN }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Maak een veilig JSON-bestand aan met jq om syntax-fouten te voorkomen
          jq -n \
            --arg title "☀️ Dagelijks Weerbericht" \
            --arg temp "$TEMP°C (Voelt als $FEEL°C)" \
            --arg wind "$WIND km/h" \
            --arg rain "$RAIN%" \
            --arg fact "$FACT" \
            '{
              embeds: [{
                title: $title,
                color: 3447003,
                fields: [
                  {name: "Temperatuur", value: $temp, inline: true},
                  {name: "Windkracht", value: $wind, inline: true},
                  {name: "Kans op regen", value: $rain, inline: true},
                  {name: "Weerfeitje van de dag", value: $fact}
                ]
              }]
            }' > discord_payload.json

          # Verstuur het JSON-bestand naar de webhook
          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_payload.json \
               "$WEBHOOK"
