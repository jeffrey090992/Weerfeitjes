on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kies weerfeitje
        id: fact
        run: |
          FACT=$(shuf -n 1 facts.txt)
          echo "FACT=$FACT" >> "$GITHUB_OUTPUT"

      - name: Haal weersverwachting op en verstuur naar Discord
        env:
          FACT: ${{ steps.fact.outputs.FACT }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&current=temperature_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FAmsterdam")
          
          VANDAAG_MAX=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')
          VANDAAG_MIN=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')
          VANDAAG_RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_probability_max[0]')

          TEMP_TXT="$VANDAAG_MIN°C tot $VANDAAG_MAX°C"
          RAIN_TXT="$VANDAAG_RAIN%"

          jq -n \
            --arg title "📅 Weersverwachting voor Vandaag" \
            --arg temp "$TEMP_TXT" \
            --arg rain "$RAIN_TXT" \
            --arg fact "$FACT" \
            '{
              embeds: [{
                title: $title,
                color: 3447003,
                fields: [
                  {name: "Verwachte Temperatuur", value: $temp, inline: true},
                  {name: "Kans op regen vandaag", value: $rain, inline: true},
                  {name: "Weerfeitje van de dag", value: $fact}
                ]
              }]
            }' > discord_payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_payload.json \
               "$WEBHOOK"
