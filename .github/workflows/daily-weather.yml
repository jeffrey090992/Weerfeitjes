name: Daily Weather

on:
  schedule:
    - cron: "0 * * * *"    # Elk uur: Live status & Alerts
    - cron: "0 6 * * *"    # 08:00 (NL tijd): Ochtendverwachting
    - cron: "0 21 * * *"   # 23:00 (NL tijd): Avondterugblik
  workflow_dispatch:

jobs:
  live-update:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule == '0 * * * *')
    steps:
      - name: Install
        run: sudo apt-get install -y jq
      - name: Verstuur Live Bericht
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          get_live() { curl -s "https://api.open-meteo.com/v1/forecast?latitude=$1&longitude=$2&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,cloud_cover,wind_speed_10m,wind_direction_10m&timezone=Europe%2FAmsterdam"; }
          get_alert() { curl -s "https://api.open-meteo.com/v1/meteoalarm?latitude=$1&longitude=$2&timezone=Europe%2FAmsterdam"; }
          fmt_l() { echo "$1" | jq -r '.current as $c | (.wind_direction_10m // 0) as $deg | (if ($deg >= 337.5 or $deg < 22.5) then "N" elif ($deg >= 22.5 and $deg < 67.5) then "NO" elif ($deg >= 67.5 and $deg < 112.5) then "O" elif ($deg >= 112.5 and $deg < 157.5) then "ZO" elif ($deg >= 157.5 and $deg < 202.5) then "Z" elif ($deg >= 202.5 and $deg < 247.5) then "ZW" elif ($deg >= 247.5 and $deg < 292.5) then "W" else "NW" end) as $dir | (if ($c.weather_code == 0) then "☀️" elif ($c.weather_code < 3) then "⛅" elif ($c.weather_code < 50) then "☁️" elif ($c.weather_code < 70) then "🌧️" else "⛈️" end) as $emoji | "Weer: \($emoji)\nTemp: \($c.temperature_2m)°C\nLuchtvocht: \($c.relative_humidity_2m)%\nBewolking: \($c.cloud_cover)%\nNeerslag: \($c.precipitation)mm\nWind: \($c.wind_speed_10m)km/u \($dir)"'; }
          
          N=$(get_live 53.21 6.56); M=$(get_live 52.13 5.29); Z=$(get_live 50.85 5.69); O=$(get_live 52.22 6.89); W=$(get_live 51.92 4.48)
          ALERT=$(get_alert 52.13 5.29 | jq -r '.event // "Geen actieve waarschuwingen"')
          
          jq -n --arg n "$(fmt_l "$N")" --arg m "$(fmt_l "$M")" --arg z "$(fmt_l "$Z")" --arg o "$(fmt_l "$O")" --arg w "$(fmt_l "$W")" --arg a "$ALERT" \
          '{embeds: [{title: "🌡️ Live Weerbericht", color: 3447003, fields: [{name: "📍 Noord", value: $n, inline: true}, {name: "📍 Midden", value: $m, inline: true}, {name: "📍 Zuid", value: $z, inline: true}, {name: "📍 Oost", value: $o, inline: true}, {name: "📍 West", value: $w, inline: true}, {name: "⚠️ Weeralarm", value: $a, inline: false}]}]}' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK"

  ochtend-verwachting:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule == '0 6 * * *')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y jq bc
      - name: Verstuur Ochtendbericht
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          FACT=$(test -f facts.txt && shuf -n 1 facts.txt || echo "Het weer is onvoorspelbaar!")
          get_data() { curl -s "https://api.open-meteo.com/v1/forecast?latitude=$1&longitude=$2&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,relative_humidity_2m_mean,uv_index_max,precipitation_probability_max,sunrise,sunset,apparent_temperature_max,wind_speed_10m_max&timezone=Europe%2FAmsterdam"; }
          
          ADVICE_LOGIC() {
            local tmp=$1; local rain=$2; local wind=$3; local prob=$4
            if (( $(echo "$rain > 5" | bc -l) )) || (( $(echo "$prob > 70" | bc -l) )); then echo "🧥 Neem een goede paraplu of regenjas mee!";
            elif (( $(echo "$wind > 30" | bc -l) )); then echo "🌬️ Het waait hard, pas op met fietsen!";
            elif (( $(echo "$tmp < 10" | bc -l) )); then echo "🧣 Het is fris, trek een warme jas aan.";
            elif (( $(echo "$tmp > 25" | bc -l) )); then echo "🧴 Vergeet je zonnebrand niet!";
            else echo "👕 Lekker weertje, geniet ervan!"; fi
          }
          
          fmt_w() { echo "$1" | jq -r '.daily | "Min: \(.temperature_2m_min[0])°C\nMax: \(.temperature_2m_max[0])°C (Gevoel: \(.apparent_temperature_max[0])°C)\nNeerslag: \(.precipitation_sum[0])mm (\(.precipitation_probability_max[0])%)\nLuchtvocht: \(.relative_humidity_2m_mean[0])%\nUV-Index: \(.uv_index_max[0])\nZon: \(.sunrise[0][11:16])-\(.sunset[0][11:16])"'; }
          
          N=$(get_data 53.21 6.56); M=$(get_data 52.13 5.29); Z=$(get_data 50.85 5.69); O=$(get_data 52.22 6.89); W=$(get_data 51.92 4.48)
          ADV=$(ADVICE_LOGIC $(echo $M | jq -r '.daily.temperature_2m_max[0]') $(echo $M | jq -r '.daily.precipitation_sum[0]') $(echo $M | jq -r '.daily.wind_speed_10m_max[0]') $(echo $M | jq -r '.daily.precipitation_probability_max[0]'))
          
          jq -n --arg f "$FACT" --arg n "$(fmt_w "$N")" --arg m "$(fmt_w "$M")" --arg z "$(fmt_w "$Z")" --arg o "$(fmt_w "$O")" --arg w "$(fmt_w "$W")" --arg adv "$ADV" \
          '{embeds: [{title: "📅 Landelijk Weeroverzicht (Verwachting)", color: 16777215, fields: [{name: "📍 Noord", value: $n, inline: true}, {name: "📍 Midden", value: $m, inline: true}, {name: "📍 Zuid", value: $z, inline: true}, {name: "📍 Oost", value: $o, inline: true}, {name: "📍 West", value: $w, inline: true}, {name: "🧥 Advies", value: $adv, inline: false}, {name: "🧠 Weerfeitje", value: $f, inline: false}]}]}' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK"

  avond-terugblik:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.schedule == '0 21 * * *')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y jq
      - name: Verstuur Avondbericht
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          get_hist() { curl -s "https://archive-api.open-meteo.com/v1/archive?latitude=$1&longitude=$2&start_date=$(date +%Y-%m-%d)&end_date=$(date +%Y-%m-%d)&daily=temperature_2m_max,precipitation_sum,wind_gusts_10m_max,relative_humidity_2m_mean&timezone=Europe%2FAmsterdam"; }
          fmt_h() { echo "$1" | jq -r '.daily | "Max: \(.temperature_2m_max[0])°C\nNeerslag: \(.precipitation_sum[0])mm\nWindstoot: \(.wind_gusts_10m_max[0]) km/u\nGem. Luchtvocht.: \(.relative_humidity_2m_mean[0])%"'; }
          N_D=$(get_hist 53.21 6.56); M_D=$(get_hist 52.13 5.29); Z_D=$(get_hist 50.85 5.69); O_D=$(get_hist 52.22 6.89); W_D=$(get_hist 51.92 4.48)
          jq -n --arg n "$(fmt_h "$N_D")" --arg m "$(fmt_h "$M_D")" --arg z "$(fmt_h "$Z_D")" --arg o "$(fmt_h "$O_D")" --arg w "$(fmt_h "$W_D")" \
          '{embeds: [{title: "📊 Landelijk Weeroverzicht (Terugblik)", color: 16744192, fields: [{name: "📍 Noord", value: $n, inline: true}, {name: "📍 Midden", value: $m, inline: true}, {name: "📍 Zuid", value: $z, inline: true}, {name: "📍 Oost", value: $o, inline: true}, {name: "📍 West", value: $w, inline: true}], description: "Fijne avond!"}]}' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK"
