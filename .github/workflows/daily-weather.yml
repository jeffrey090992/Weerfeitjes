name: Daily Weather

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Installeer tools
        run: |
          sudo apt-get install -y jq
          pip install requests pandas

      - name: Haal KNMI data op
        run: python scripts/import_knmi.py

      - name: Verwerk data
        run: python scripts/daily_records.py

      - name: Verstuur naar Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Controleer of JSON bestaat
          if [ ! -f daily_records.json ]; then
            echo "JSON bestand niet gevonden!"
            exit 1
          fi

          WARM=$(jq -r '.warmste.waarde' daily_records.json)
          COLD=$(jq -r '.koudste.waarde' daily_records.json)
          WET=$(jq -r '.natste.waarde' daily_records.json)
          
          jq -n \
            --arg w "$WARM" --arg c "$COLD" --arg wt "$WET" \
            '{
              "embeds": [{
                "title": "📅 Weeroverzicht",
                "color": 3447003,
                "fields": [
                  {"name": "🔥 Max", "value": ($w + "°C"), "inline": true},
                  {"name": "❄️ Min", "value": ($c + "°C"), "inline": true},
                  {"name": "🌧️ Regen", "value": ($wt + " mm")}
                ]
              }]
            }' > payload.json
            
          curl -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK"
