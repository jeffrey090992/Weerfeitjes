name: Dagelijks Weerfeitje

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-weather-fact:
    runs-on: ubuntu-latest
    steps:
      - name: Select Random Weather Fact
        id: fact
        run: |
          FACTS=(
            "🌧️ Feitje 1"
            "⚡ Feitje 2"
          )
          RANDOM_INDEX=$((RANDOM % ${#FACTS[@]}))
          SELECTED_FACT="${FACTS[$RANDOM_INDEX]}"
          echo "FACT=$SELECTED_FACT" >> $GITHUB_OUTPUT
      - name: Verzend naar Discord
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"embeds": [{"title": "☀️ Dagelijks Weerfeitje","description": "${{ steps.fact.outputs.FACT }}","color": 3447003,"footer": {"text": "Leer elke dag een nieuw weerfeit! 🌤️"}}]}'
