name: Daily Weather

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer pakketten
        run: |
          pip install -r requirements.txt

      - name: Kies weerfeitje
        id: fact
        run: |
          FACT=$(shuf -n 1 facts.txt)
          echo "FACT=$FACT" >> "$GITHUB_OUTPUT"

      - name: Maak dagrecords
        run: |
          python scripts/daily_records.py

      - name: Haal weer op en stuur Discord
        env:
          FACT: ${{ steps.fact.outputs.FACT }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |

          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max,wind_gusts_10m_max,sunshine_duration,precipitation_sum,snowfall_sum,precipitation_hours,cloud_cover_mean,wind_speed_10m_max,wind_direction_10m_dominant&timezone=Europe%2FAmsterdam")

          MAX=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')
          MIN=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')
          RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_probability_max[0]')

          SUNRISE=$(echo "$DATA" | jq -r '.daily.sunrise[0]' | cut -d'T' -f2)
          SUNSET=$(echo "$DATA" | jq -r '.daily.sunset[0]' | cut -d'T' -f2)

          UV=$(echo "$DATA" | jq -r '.daily.uv_index_max[0]')
          WIND=$(echo "$DATA" | jq -r '.daily.wind_speed_10m_max[0]')
          GUST=$(echo "$DATA" | jq -r '.daily.wind_gusts_10m_max[0]')
          CLOUD=$(echo "$DATA" | jq -r '.daily.cloud_cover_mean[0]')
          RAIN_MM=$(echo "$DATA" | jq -r '.daily.precipitation_sum[0]')

          RECORD_DATE=$(jq -r '.datum' daily_records.json)

          WARM=$(jq -r '.warmste.waarde' daily_records.json)
          WARM_DATE=$(jq -r '.warmste.datum' daily_records.json)

          COLD=$(jq -r '.koudste.waarde' daily_records.json)
          COLD_DATE=$(jq -r '.koudste.datum' daily_records.json)

          WET=$(jq -r '.natste.waarde' daily_records.json)
          WET_DATE=$(jq -r '.natste.datum' daily_records.json)

          cat > discord_payload.json <<EOF    
          
                               {
  "embeds": [
    {
      "title": "📅 Weersverwachting voor Vandaag",
      "color": 3447003,
      "fields": [
        {
          "name": "🌡️ Temperatuur",
          "value": "$MIN°C tot $MAX°C",
          "inline": true
        },
        {
          "name": "🌧️ Regenkans",
          "value": "$RAIN%",
          "inline": true
        },
        {
          "name": "🌅 Zon",
          "value": "🌅 $SUNRISE | 🌇 $SUNSET",
          "inline": false
        },
        {
          "name": "📊 Dagrecords ($RECORD_DATE)",
          "value": "🔥 Warmste: $WARM°C ($WARM_DATE)\n❄️ Koudste: $COLD°C ($COLD_DATE)\n🌧️ Natste: $WET mm ($WET_DATE)",
          "inline": false
        },
        {
          "name": "🧠 Weerfeitje",
          "value": "$FACT",
          "inline": false
        }
      ]
    }
  ]
}
EOF


          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_payload.json \
               "$WEBHOOK"
