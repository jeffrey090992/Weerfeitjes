name: Daily Weather

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "50 22 * * *"
  workflow_dispatch:

jobs:
  ochtend-verwachting:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y jq bc
      - name: Verstuur Ochtendbericht
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PING_ROLE: "<@&123456789012345678>"
        run: |
          FACT=$(shuf -n 1 facts.txt)
          # API-call uitgebreid met relative_humidity_2m_max en visibility_max
          get_data() { curl -s "https://api.open-meteo.com/v1/forecast?latitude=$1&longitude=$2&current=temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max,wind_speed_10m_max,wind_direction_10m_dominant,sunrise,sunset,relative_humidity_2m_max,visibility_max&timezone=Europe%2FAmsterdam"; }
          
          fmt_w() { 
            echo "$1" | jq -r '.daily | 
            (.weather_code[0]) as $code |
            (.wind_direction_10m_dominant[0] // 0) as $deg |
            (if ($deg >= 337.5 or $deg < 22.5) then "N" elif ($deg >= 22.5 and $deg < 67.5) then "NO" elif ($deg >= 67.5 and $deg < 112.5) then "O" elif ($deg >= 112.5 and $deg < 157.5) then "ZO" elif ($deg >= 157.5 and $deg < 202.5) then "Z" elif ($deg >= 202.5 and $deg < 247.5) then "ZW" elif ($deg >= 247.5 and $deg < 292.5) then "W" else "NW" end) as $dir |
            (if ($code == 0) then "☀️" elif ($code < 3) then "⛅" elif ($code < 50) then "☁️" elif ($code < 70) then "🌧️" elif ($code < 80) then "❄️" else "⛈️" end) as $emoji |
            "Min: \(.temperature_2m_min[0])°C | Max: \(.temperature_2m_max[0])°C\nWeer: \($emoji) | Neerslag: \(.precipitation_sum[0])mm\nWind: \(.wind_speed_10m_max[0]) km/u (\($dir))\nLuchtvocht.: \(.relative_humidity_2m_max[0])% | Zicht: \(.visibility_max[0])m\nUV: \(.uv_index_max[0]) | Zon: \(.sunrise[0][11:16]) - \(.sunset[0][11:16])"'
          }

          ADVICE_LOGIC() {
            local tmp=$1; local rain=$2
            if (( $(echo "$rain > 0" | bc -l) )); then echo "🧥 Neem een paraplu mee!";
            elif (( $(echo "$tmp < 15" | bc -l) )); then echo "🧣 Trek een warme jas aan.";
            elif (( $(echo "$tmp > 25" | bc -l) )); then echo "🧴 Smeer je in, het wordt heet!";
            else echo "👕 Lekker weertje, geniet ervan!"; fi
          }
          
          NOORD=$(get_data 53.21 6.56)
          MIDDEN=$(get_data 52.13 5.29)
          ZUID=$(get_data 50.85 5.69)
          
          N_NOW=$(echo $NOORD | jq -r '.current.temperature_2m')
          M_NOW=$(echo $MIDDEN | jq -r '.current.temperature_2m')
          Z_NOW=$(echo $ZUID | jq -r '.current.temperature_2m')
          
          W_CODE=$(echo $MIDDEN | jq -r '.daily.weather_code[0]')
          THUMB=$(if [ $W_CODE -eq 0 ]; then echo "https://cdn-icons-png.flaticon.com/512/869/869869.png"; else echo "https://cdn-icons-png.flaticon.com/512/1163/1163662.png"; fi)
          
          TEMP_MAX=$(echo $MIDDEN | jq -r '.daily.temperature_2m_max[0]')
          RAIN_SUM=$(echo $MIDDEN | jq -r '.daily.precipitation_sum[0]')
          ADVICE=$(ADVICE_LOGIC $TEMP_MAX $RAIN_SUM)
          
          TEMP_AVG=$(echo "$NOORD $MIDDEN $ZUID" | jq -s '(.[0].daily.temperature_2m_max[0] + .[1].daily.temperature_2m_max[0] + .[2].daily.temperature_2m_max[0]) / 3')
          COLOR=$(awk -v t=$TEMP_AVG 'BEGIN { if (t > 22) print 16753920; else if (t < 12) print 3447003; else print 16777215 }')
          
          # Tijdstempel voor verversing
          TIME_NOW=$(date +'%H:%M')
          
          jq -n --arg f "$FACT" --arg n "$(fmt_w "$NOORD")" --arg m "$(fmt_w "$MIDDEN")" --arg z "$(fmt_w "$ZUID")" \
                --arg n_n "$N_NOW" --arg m_n "$M_NOW" --arg z_n "$Z_NOW" --argjson c "$COLOR" \
                --arg th "$THUMB" --arg adv "$ADVICE" --arg p "$PING_ROLE" --arg t "$TIME_NOW" \
            '{content: $p, embeds: [{title: "📅 Landelijk Weeroverzicht", color: $c, thumbnail: {url: $th}, footer: {text: "Laatst ververst: \($t)"}, fields: [
              {name: "🌡️ Live (N/M/Z)", value: "\($n_n)°C / \($m_n)°C / \($z_n)°C", inline: false},
              {name: "📍 Noord", value: $n},
              {name: "📍 Midden", value: $m},
              {name: "📍 Zuid", value: $z},
              {name: "🧥 Kledingadvies", value: $adv},
              {name: "🧠 Weerfeitje", value: $f}
            ]}]}' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json "$WEBHOOK"
