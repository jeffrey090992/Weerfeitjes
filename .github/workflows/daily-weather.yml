name: Daily Weather

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer dependencies
        run: |
          sudo apt-get install -y jq
          pip install requests pandas

      - name: Verstuur naar Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Fact ophalen
          FACT=$(shuf -n 1 facts.txt)
          
          # Weerdata ophalen (API)
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max,wind_gusts_10m_max,precipitation_sum,cloud_cover_mean,wind_speed_10m_max&timezone=Europe%2FAmsterdam")
          MAX=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')
          MIN=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')
          RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_probability_max[0]')
          SUNRISE=$(echo "$DATA" | jq -r '.daily.sunrise[0]' | cut -d'T' -f2)
          SUNSET=$(echo "$DATA" | jq -r '.daily.sunset[0]' | cut -d'T' -f2)
          
          # Bouw JSON zonder de dagrecords sectie
          jq -n \
            --arg fact "$FACT" \
            --arg temp "$MIN°C tot $MAX°C" \
            --arg rain "$RAIN%" \
            --arg sun "🌅 $SUNRISE | 🌇 $SUNSET" \
            '{
              "embeds": [{
                "title": "📅 Weersverwachting voor Vandaag",
                "color": 3447003,
                "fields": [
                  {"name": "🌡️ Temperatuur", "value": $temp, "inline": true},
                  {"name": "🌧️ Kans op regen", "value": $rain, "inline": true},
                  {"name": "🌅 Zon", "value": $sun},
                  {"name": "🧠 Weerfeitje", "value": $fact}
                ]
              }]
            }' > discord_payload.json
            
          curl -H "Content-Type: application/json" -X POST -d @discord_payload.json "$WEBHOOK"
