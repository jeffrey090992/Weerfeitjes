name: Dagelijks Weerbericht

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kies weerfeitje
        id: fact
        run: |
          FACT=$(shuf -n 1 facts.txt)
          echo "FACT=$FACT" >> "$GITHUB_OUTPUT"

      - name: Haal weer op
        id: weather
        run: |
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&current=temperature_2m,apparent_temperature,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FAmsterdam")

          echo "TEMP=$(echo "$DATA" | jq -r '.current.temperature_2m')" >> "$GITHUB_OUTPUT"
          echo "FEEL=$(echo "$DATA" | jq -r '.current.apparent_temperature')" >> "$GITHUB_OUTPUT"
          echo "WIND=$(echo "$DATA" | jq -r '.current.wind_speed_10m')" >> "$GITHUB_OUTPUT"
          echo "MIN=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')" >> "$GITHUB_OUTPUT"
          echo "MAX=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')" >> "$GITHUB_OUTPUT"
          echo "RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_probability_max[0]')" >> "$GITHUB_OUTPUT"

      - name: Haal zon op
        id: sun
        run: |
          DATA=$(curl -s "https://api.sunrise-sunset.org/json?lat=52.13&lng=5.29&formatted=0")

          echo "SUNRISE=$(echo "$DATA" | jq -r '.results.sunrise')" >> "$GITHUB_OUTPUT"
          echo "SUNSET=$(echo "$DATA" | jq -r '.results.sunset')" >> "$GITHUB_OUTPUT"

      - name: Maak Discord bericht
        run: |
          cat > message.json <<EOF
          {
            "content": "🌞 Goedemorgen Nederland!\n\n🌦️ Weerbericht\n\n🌡️ Temperatuur:\nNu: ${{ steps.weather.outputs.TEMP }}°C\nVoelt als: ${{ steps.weather.outputs.FEEL }}°C\nVandaag: ${{ steps.weather.outputs.MIN }}°C - ${{ steps.weather.outputs.MAX }}°C\n\n🌧️ Regenkans:\n${{ steps.weather.outputs.RAIN }}%\n\n💨 Wind:\n${{ steps.weather.outputs.WIND }} km/u\n\n☀️ Zon:\n🌅 Opkomst: ${{ steps.sun.outputs.SUNRISE }}\n🌇 Onder: ${{ steps.sun.outputs.SUNSET }}\n\n🌦️ Weerfeitje:\n${{ steps.fact.outputs.FACT }}"
          }
          EOF

      - name: Verstuur naar Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            --data @message.json
