name: Dagelijks Weerbericht

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  send-weather-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kies weerfeitje
        id: fact
        run: |
          FACT=$(shuf -n 1 facts.txt)

          echo "FACT<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FACT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Haal weer op voor Nederland
        id: weather
        run: |
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&current=temperature_2m,apparent_temperature,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FAmsterdam")

          echo "TEMP=$(echo "$DATA" | jq -r '.current.temperature_2m')" >> "$GITHUB_OUTPUT"
          echo "FEEL=$(echo "$DATA" | jq -r '.current.apparent_temperature')" >> "$GITHUB_OUTPUT"
          echo "WIND=$(echo "$DATA" | jq -r '.current.wind_speed_10m')" >> "$GITHUB_OUTPUT"
          echo "MIN=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')" >> "$GITHUB_OUTPUT"
          echo "MAX=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')" >> "$GITHUB_OUTPUT"
          echo "RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_probability_max[0]')" >> "$GITHUB_OUTPUT"

      - name: Haal zon tijden op
        id: sun
        run: |
          DATA=$(curl -s "https://api.sunrise-sunset.org/json?lat=52.13&lng=5.29&formatted=0")

          SUNRISE=$(echo "$DATA" | jq -r '.results.sunrise')
          SUNSET=$(echo "$DATA" | jq -r '.results.sunset')

          echo "SUNRISE=$(date -d "$SUNRISE" +"%H:%M")" >> "$GITHUB_OUTPUT"
          echo "SUNSET=$(date -d "$SUNSET" +"%H:%M")" >> "$GITHUB_OUTPUT"

      - name: Verstuur naar Discord
        env:
          FACT: ${{ steps.fact.outputs.FACT }}
          TEMP: ${{ steps.weather.outputs.TEMP }}
          FEEL: ${{ steps.weather.outputs.FEEL }}
          WIND: ${{ steps.weather.outputs.WIND }}
          MIN: ${{ steps.weather.outputs.MIN }}
          MAX: ${{ steps.weather.outputs.MAX }}
          RAIN: ${{ steps.weather.outputs.RAIN }}
          SUNRISE: ${{ steps.sun.outputs.SUNRISE }}
          SUNSET: ${{ steps.sun.outputs.SUNSET }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          MESSAGE="🌞 Goedemorgen Nederland!

🌦️ Weerbericht

🌡️ Temperatuur:
Nu: ${TEMP}°C
Voelt als: ${FEEL}°C
Vandaag: ${MIN}°C - ${MAX}°C

🌧️ Regenkans:
${RAIN}%

💨 Wind:
${WIND} km/u

☀️ Zon:
🌅 Opkomst: ${SUNRISE}
🌇 Onder: ${SUNSET}

🌦️ Weerfeitje:
${FACT}"

          jq -n --arg content "$MESSAGE" '{content: $content}' | \
          curl -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @-
