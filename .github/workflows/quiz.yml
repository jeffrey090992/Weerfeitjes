name: Verstuur Weer-Quiz

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  stuur-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verstuur Quiz naar Discord
        env:
          WEBHOOK_URL: ${{ secrets.RAAD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Fout: Webhook URL 'RAAD_WEBHOOK' is niet gevonden!"
            exit 1
          fi

          REGEL=$(shuf -n 1 quiz.txt)
          CATEGORIE=$(echo $REGEL | cut -d'|' -f1)
          INFO=$(echo $REGEL | cut -d'|' -f2)
          # Het antwoord is hier beschikbaar als variabele $ANTWOORD
          ANTWOORD=$(echo $REGEL | cut -d'|' -f3)

          case $CATEGORIE in
              WOLK) TITEL="☁️ Raad de wolk" ;;
              STORM) TITEL="🌀 Raad de storm" ;;
              TERM) TITEL="📖 Raad de term" ;;
              FENOMEEN) TITEL="⚡ Raad het fenomeen" ;;
              INSTRUMENT) TITEL="🛠️ Raad het instrument" ;;
              *) TITEL="🧩 De dagelijkse Weer-quiz" ;;
          esac

          curl -H "Content-Type: application/json" -d "{
            \"username\": \"Weer-Quizmaster\",
            \"embeds\": [{
              \"title\": \"$TITEL\",
              \"description\": \"$INFO \n\n*Wat denk jij dat het is? Laat je antwoord achter in de chat!*\"
            }]
          }" $WEBHOOK_URL
