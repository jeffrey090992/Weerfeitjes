on:
  schedule:
    - cron: "0 20 * * *" # Elk dag om 22:00 uur Nederlandse tijd (20:00 UTC)
  workflow_dispatch:

jobs:
  send-evening-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Haal weerextremen op en verstuur naar Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # We vragen de gemeten waarden van vandaag op via de forecast API (die bevat ook de actuele dagmetingen)
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_gusts_10m_max&timezone=Europe%2FAmsterdam")
          
          MAX_TEMP=$(echo "$DATA" | jq -r '.daily.temperature_2m_max[0]')
          MIN_TEMP=$(echo "$DATA" | jq -r '.daily.temperature_2m_min[0]')
          TOTAL_RAIN=$(echo "$DATA" | jq -r '.daily.precipitation_sum[0]')
          MAX_GUST=$(echo "$DATA" | jq -r '.daily.wind_gusts_10m_max[0]')

          # Bepaal een leuke samenvatting op basis van het weer van vandaag
          if (( $(echo "$TOTAL_RAIN > 5.0" | bc -l) )); then
            STATUS="🌧️ Het was een behoorlijk natte dag."
          elif (( $(echo "$MAX_TEMP > 25.0" | bc -l) )); then
            STATUS="☀️ Een heerlijke warme zomerdag!"
          elif (( $(echo "$MAX_GUST > 50.0" | bc -l) )); then
            STATUS="🌬️ Het ging er onstuimig aan toe vandaag."
          else
            STATUS="🌤️ Een prima, rustige dag achter de rug."
          fi

          # Array bouwen voor de opgemaakte details
          jq -n \
            --arg title "📊 Het Weer van Vandaag: De Terugblik" \
            --arg status "$STATUS" \
            --arg max "$MAX_TEMP" \
            --arg min "$MIN_TEMP" \
            --arg rain "$TOTAL_RAIN" \
            --arg gust "$MAX_GUST" \
            '{
              embeds: [{
                title: $title,
                description: $status,
                color: 15105570, # Een mooie avond/oranje kleur
                fields: [
                  {name: "🔥 Hoogste temperatuur", value: ($max + "°C"), inline: true},
                  {name: "🧊 Laagste temperatuur", value: ($min + "°C"), inline: true},
                  {name: "\u200b", value: "\u200b", inline: false}, # Lege regel voor structuur
                  {name: "💧 Totale neerslag", value: ($rain + " mm"), inline: true},
                  {name: "💨 Hardste windstoot", value: ($gust + " km/h"), inline: true}
                ],
                footer: { text: "Fijne avond!" }
              }]
            }' > discord_evening_payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_evening_payload.json \
               "$WEBHOOK"
