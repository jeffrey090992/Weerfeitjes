on:
  schedule:
    - cron: "0 16 * * *" # Elke middag om 17:00 uur Nederlandse tijd (16:00 UTC) om te checken voor de avond
  workflow_dispatch:

jobs:
  space-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Controleer ISS en voeg Starlink toe
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 1. Haal de bewolking op voor komende nacht via de astronomie API
          WEATHER_DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&daily=cloud_cover_mean&timezone=Europe%2FAmsterdam")
          CLOUDS=$(echo "$WEATHER_DATA" | jq -r '.daily.cloud_cover_mean[0]')

          # Gemiddelde bewolking controleren voor het zicht
          if [ "$CLOUDS" = "null" ] || [ -z "$CLOUDS" ]; then
            CLOUDS=0
          fi

          if [ "$CLOUDS" -le 40 ]; then
            ZICHT="🌌 **Goed zicht verwacht!** De gemiddelde bewolking is vanavond slechts $CLOUDS%."
            COLOR=3447003 # Blauw
          else
            ZICHT="☁️ **Slecht zicht:** Er is redelijk wat bewolking ($CLOUDS%), dus de kans is kleiner dat je ze goed ziet."
            COLOR=8421504 # Grijs
          fi

          # 2. Payload bouwen met beide trackers gecombineerd via jq
          jq -n \
            --arg title "🚀 Ruimtevaart Tracker: ISS & Starlink" \
            --arg zicht "$ZICHT" \
            --arg color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $zicht,
                color: ($color | tonumber),
                fields: [
                  {
                    name: "🛰️ 1. Internationaal Ruimtestation (ISS)", 
                    value: "Het ISS trekt over als een hele felle, snelle stip zonder knipperende lichten.\n👉 [Bekijk exacte tijden op Heavens-Above](https://www.heavens-above.com/PassSummary.aspx?lat=52.13&lng=5.29&tz=CET)", 
                    inline: false
                  },
                  {
                    name: "✨ 2. Starlink Satelliet-treintjes", 
                    value: "Als SpaceX recent een nieuwe lading heeft gelanceerd, trekken ze als een strakke lijn van sterren achter elkaar aan door de lucht.\n👉 [Bekijk live passages op FindStarlink](https://findstarlink.com/#52.13,5.29;3)", 
                    inline: false
                  }
                ],
                footer: { text: "Kijk vanavond omhoog! Clear skies!" }
              }]
            }' > discord_space_payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_space_payload.json \
               "$WEBHOOK"
