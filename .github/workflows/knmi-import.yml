name: KNMI Dagrecords Import

on:
  workflow_dispatch:

jobs:
  import-knmi:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Packages installeren
        run: |
          pip install -r requirements.txt

      - name: KNMI data ophalen
        run: |
          python scripts/import_knmi.py

      - name: Database opslaan
        run: |
          git config --global user.name "KNMI Bot"
          git config --global user.email "actions@github.com"

          git add database/knmi_weather.db

          git commit -m "Update KNMI dagrecords database" || exit 0

          git push
