on:
  schedule:
    - cron: "0 */3 * * *" # Draait elke 3 uur
  workflow_dispatch:

jobs:
  check-aurora:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Controleer Kp-index van NOAA
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Haal de meest actuele Kp-index voorspelling op
          KP_DATA=$(curl -s "https://services.swpc.noaa.gov/products/noaa-scales-3-day.json")
          
          # Pak de eerstvolgende Kp-waarde uit de database
          KP_VAL=$(echo "$KP_DATA" | jq -r '.geomagnetic[0].scale // "0"' | tr -d 'G')
          
          # Om te kunnen testen sturen we áltijd een bericht als je hem handmatig start (workflow_dispatch)
          # Maar in het automatische schema (cron) stuurt hij hem pas vanaf Kp 4 of hoger
          if [ "$KP_VAL" -ge 4 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            
            # Bepaal de status op basis van de Kp-waarde
            if [ "$KP_VAL" -ge 6 ]; then
              STATUS="🔴 **Sterke zonnestorm actief (Kp $KP_VAL)!** Grote kans op noorderlicht in Nederland bij helder weer!"
              COLOR=16711680 # Rood
            elif [ "$KP_VAL" -ge 4 ]; then
              STATUS="🟡 **Verhoogde activiteit (Kp $KP_VAL).** Fotografisch noorderlicht is mogelijk. Kijk naar het noorden!"
              COLOR=16776960 # Geel
            else
              STATUS="🟢 **Geen zonnestorm (Kp $KP_VAL).** De activiteit is momenteel rustig."
              COLOR=65280 # Groen
            fi

            ALERT_MSG="$STATUS\n\nAls het vanavond onbewolkt is, loont het de moeite om op een donkere plek buiten de stad richting het noorden te kijken."

            jq -n \
              --arg title "🌌 Noorderlicht & Zonneactiviteit Update" \
              --arg desc "$ALERT_MSG" \
              --arg color "$COLOR" \
              '{
                embeds: [{
                  title: $title,
                  description: $desc,
                  color: ($color | tonumber),
                  fields: [
                    {name: "📊 Actuele Status", value: "Als je dit via de ’Run workflow’ knop test, zie je hier altijd de huidige status.", inline: false}
                  ],
                  footer: { text: "Data via NOAA Space Weather Prediction Center" }
                }]
              }' > discord_aurora_payload.json

            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d @discord_aurora_payload.json \
                 "$WEBHOOK"
          else
            echo "Kp-index ($KP_VAL) is momenteel te laag voor een automatische melding."
          fi
