name: Stargazing Report

on:
  schedule:
    - cron: "30 20 * * *" # Elke dag om 22:30 uur Nederlandse tijd (20:30 UTC)
  workflow_dispatch:

jobs:
  stargazing-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bereken sterrenkijk-score en maanfase
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Data ophalen
          DATA=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=52.13&longitude=5.29&daily=cloud_cover_mean,moon_phase&timezone=Europe%2FAmsterdam")
          
          CLOUDS=$(echo "$DATA" | jq -r '.daily.cloud_cover_mean[0]')
          MOON_PHASE_NUM=$(echo "$DATA" | jq -r '.daily.moon_phase[0]')

          # Fallback voor clouds
          if [ "$CLOUDS" = "null" ] || [ -z "$CLOUDS" ]; then
            CLOUDS=0
          fi

          # Maanfase berekenen
          if (( $(echo "$MOON_PHASE_NUM == 0" | bc -l) )); then
            MAAN_FASE="🌑 Nieuwe Maan"
            MOON_PCT=0
          elif (( $(echo "$MOON_PHASE_NUM > 0" | bc -l) )) && (( $(echo "$MOON_PHASE_NUM < 25" | bc -l) )); then
            MAAN_FASE="🌒 Wassende Sikkel"
            MOON_PCT=$(( MOON_PHASE_NUM * 4 ))
          elif (( $(echo "$MOON_PHASE_NUM == 25" | bc -l) )); then
            MAAN_FASE="🌓 Eerste Kwartier"
            MOON_PCT=50
          elif (( $(echo "$MOON_PHASE_NUM > 25" | bc -l) )) && (( $(echo "$MOON_PHASE_NUM < 50" | bc -l) )); then
            MAAN_FASE="🌔 Wassende Maan"
            MOON_PCT=$(( (MOON_PHASE_NUM - 25) * 2 + 50 ))
          elif (( $(echo "$MOON_PHASE_NUM == 50" | bc -l) )); then
            MAAN_FASE="🌕 Volle Maan"
            MOON_PCT=100
          elif (( $(echo "$MOON_PHASE_NUM > 50" | bc -l) )) && (( $(echo "$MOON_PHASE_NUM < 75" | bc -l) )); then
            MAAN_FASE="🌖 Krimpende Maan"
            MOON_PCT=$(( 100 - (MOON_PHASE_NUM - 50) * 2 ))
          elif (( $(echo "$MOON_PHASE_NUM == 75" | bc -l) )); then
            MAAN_FASE="🌗 Laatste Kwartier"
            MOON_PCT=50
          else
            MAAN_FASE="🌘 Krimpende Sikkel"
            MOON_PCT=$(( (100 - MOON_PHASE_NUM) * 4 ))
          fi

          # Sterrenkijk-score berekenen
          SCORE=10
          if (( $(echo "$CLOUDS > 80" | bc -l) )); then SCORE=$((SCORE - 6));
          elif (( $(echo "$CLOUDS > 50" | bc -l) )); then SCORE=$((SCORE - 4));
          elif (( $(echo "$CLOUDS > 20" | bc -l) )); then SCORE=$((SCORE - 2));
          fi

          if [ "$MOON_PCT" -gt 85 ] && [ $SCORE -gt 2 ]; then
            SCORE=$((SCORE - 2))
          fi
          if [ $SCORE -lt 1 ]; then SCORE=1; fi

          # Advies bepalen
          if [ $SCORE -ge 8 ]; then
            ADVIES="🔭 **Perfecte nacht!** Het is helder en de omstandigheden zijn optimaal. Pak je telescoop of verrekijker!"
            COLOR=1752220
          elif [ $SCORE -ge 5 ]; then
            ADVIES="🌤️ **Redelijke omstandigheden:** Er is wat bewolking of maanlicht, maar tussendoor kun je prima kijken."
            COLOR=15105570
          else
            ADVIES="☁️ **Slechte nacht:** Te veel bewolking of storend maanlicht. Je kunt beter binnen blijven."
            COLOR=12582912
          fi

          # Payload versturen
          jq -n \
            --arg title "🔭 Sterrenkijk-weerbericht voor vannacht" \
            --arg score "Score voor vannacht: $SCORE/10" \
            --arg advies "$ADVIES" \
            --arg maan "$MAAN_FASE ($MOON_PCT% verlicht)" \
            --arg wolken "$CLOUDS%" \
            --arg color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $advies,
                color: ($color | tonumber),
                fields: [
                  {name: "📊 Kwaliteit van de nacht", value: $score, inline: true},
                  {name: "☁️ Gemiddelde bewolking", value: $wolken, inline: true},
                  {name: "🌓 Stand van de Maan", value: $maan, inline: false}
                ],
                footer: { text: "Clear skies!" }
              }]
            }' > discord_star_payload.json

          curl -H "Content-Type: application/json" -X POST -d @discord_star_payload.json "$WEBHOOK"
