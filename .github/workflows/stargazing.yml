on:
  schedule:
    - cron: "0 17 * * 5" # Elke vrijdag om 19:00 uur Nederlandse tijd (17:00 UTC)
  workflow_dispatch:

jobs:
  stargazing-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bereken sterrenkijk-score en maanfase
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 1. Haal de bewolking op via Open-Meteo
          DATA=$(curl -s "https://api.open-meteo.com/v1/astronomy?latitude=52.13&longitude=5.29&daily=cloud_cover_mean&timezone=Europe%2FAmsterdam")
          CLOUDS=$(echo "$DATA" | jq -r '.daily.cloud_cover_mean[0]')
          
          # 2. Haal de actuele maanfase op via een stabiele astronomie-API
          DATE_NOW=$(date +%m/%d/%Y)
          MOON_DATA=$(curl -s "https://aa.usno.navy.mil/api/rstt/oneday?date=$DATE_NOW&coords=52.13,5.29&tz=2")
          
          # Haal de tekstuele fase en het verlichte percentage op
          MOON_PHASE_ENG=$(echo "$MOON_DATA" | jq -r '.properties.curphase // "Unknown"')
          MOON_PCT=$(echo "$MOON_DATA" | jq -r '.properties.fracillum // "0"' | tr -d '%')

          # Maanfase vertalen naar Nederlands en emoji
          case "$MOON_PHASE_ENG" in
            "New Moon") MAAN_FASE="🌑 Nieuwe Maan (Perfect voor diepe sterrenkijken)" ;;
            "Waxing Crescent") MAAN_FASE="🌒 Wassende Sikkel (Weinig lichtvervuiling)" ;;
            "First Quarter") MAAN_FASE="🌓 Eerste Kwartier (Matige lichtvervuiling)" ;;
            "Waxing Gibbous") MAAN_FASE="🌔 Wassende Maan (Veel lichtvervuiling)" ;;
            "Full Moon") MAAN_FASE="🌕 Volle Maan (Veel lichtvervuiling, sterren minder goed zichtbaar)" ;;
            "Waning Gibbous") MAAN_FASE="🌖 Krimpende Maan (Veel lichtvervuiling in de vroege ochtend)" ;;
            "Last Quarter") MAAN_FASE="🌗 Laatste Kwartier (Maan komt pas laat op)" ;;
            "Waning Crescent") MAAN_FASE="🌘 Krimpende Sikkel (Prima zicht in de avond)" ;;
            *) MAAN_FASE="🌙 Maanfase: $MOON_PHASE_ENG" ;;
          esac

          # 3. Sterrenkijk-score berekenen (max 10)
          SCORE=10
          
          # Aftrek voor wolken
          if (( $(echo "$CLOUDS > 80" | bc -l) )); then SCORE=$((SCORE - 6));
          elif (( $(echo "$CLOUDS > 50" | bc -l) )); then SCORE=$((SCORE - 4));
          elif (( $(echo "$CLOUDS > 20" | bc -l) )); then SCORE=$((SCORE - 2));
          fi

          # Aftrek voor felle maan (boven 85% verlicht)
          if [ "$MOON_PCT" -gt 85 ] && [ $SCORE -gt 2 ]; then
            SCORE=$((SCORE - 2))
          fi

          # Zorg dat score niet onder de 1 zakt
          if [ $SCORE -lt 1 ]; then SCORE=1; fi

          # Advies bepalen
          if [ $SCORE -ge 8 ]; then
            ADVIES="🔭 **Perfecte nacht!** Het is helder en de omstandigheden zijn optimaal. Pak je telescoop of verrekijker!"
            COLOR=1752220 # Groen
          elif [ $SCORE -ge 5 ]; then
            ADVIES="🌤️ **Redelijke omstandigheden:** Er is wat bewolking of maanlicht, maar tussendoor kun je prima kijken."
            COLOR=15105570 # Oranje
          else
            ADVIES="☁️ **Slechte nacht:** Te veel bewolking of storend maanlicht. Je kunt beter binnen blijven."
            COLOR=12582912 # Rood
          fi

          # Payload versturen via jq
          jq -n \
            --arg title "🔭 Sterrenkijk-weerbericht voor het Weekend" \
            --arg score "Score voor vannacht: $SCORE/10" \
            --arg advies "$ADVIES" \
            --arg maan "$MAAN_FASE ($MOON_PCT% verlicht)" \
            --arg wolken "$CLOUDS%" \
            --arg color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $advies,
                color: ($color | tonumber),
                fields: [
                  {name: "📊 Kwaliteit van de nacht", value: $score, inline: true},
                  {name: "☁️ Gemiddelde bewolking", value: $wolken, inline: true},
                  {name: "🌓 Stand van de Maan", value: $maan, inline: false}
                ],
                footer: { text: "Clear skies!" }
              }]
            }' > discord_star_payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord_star_payload.json \
               "$WEBHOOK"
